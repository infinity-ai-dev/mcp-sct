version: "3.7"

# Docker Compose - MCP-SCT
# Deploy: docker stack deploy -c docker-compose.yml mcp_sct

services:
  #########################################################
  # MCP-SCT Server (Cloud Mode - HTTP Transport) ##########
  #########################################################
  mcp_sct_server:
    image: infinitytools/mcp-sct:latest
    hostname: "{{.Service.Name}}.{{.Task.Slot}}"
    networks:
      - network_public
    environment:
      #########################################################
      # Configuração do MCP-SCT ###############################
      #########################################################
      - MCP_SCT_MODE=cloud
      - MCP_SCT_ADDR=:8080
      #########################################################
      # Configuração de Autenticação ##########################
      #########################################################
      - MCP_SCT_ADMIN_TOKEN=mcp_a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
      #########################################################
      # Configuração do Banco de Dados ########################
      # PostgreSQL já deployado na stack existente ############
      #########################################################
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=mcp_sct
      - DB_USER=postgres
      - DB_PASSWORD=7y8auHScpUTrQWhjbrlu8yc0RzNib2wn
      - DB_SSLMODE=disable
      #########################################################
      # Configuração do Scanner ###############################
      #########################################################
      - MCP_SCT_SEVERITY_THRESHOLD=LOW
      - MCP_SCT_BUILTIN_RULES=true
      #########################################################
      # Configuração do AI Bridge (opcional) ##################
      #########################################################
      - MCP_SCT_AI_ENABLED=true
      # - OPENAI_API_KEY=sk-...
      - ANTHROPIC_API_KEY=YOUR_ANTHROPIC_API_KEY_HERE
      # - OLLAMA_HOST=http://ollama:11434
      #########################################################
      # Logging e Timezone ####################################
      #########################################################
      - MCP_SCT_LOG_LEVEL=info
      - TZ=America/Sao_Paulo
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
      labels:
        #########################################################
        # Configuração do Traefik ###############################
        #########################################################
        - traefik.enable=true
        - traefik.http.routers.mcp_sct_server.rule=Host(`mcp.sct.mayacrm.shop`)
        - traefik.http.routers.mcp_sct_server.entrypoints=websecure
        - traefik.http.routers.mcp_sct_server.tls.certresolver=letsencryptresolver
        - traefik.http.routers.mcp_sct_server.service=mcp_sct_server
        - traefik.http.services.mcp_sct_server.loadbalancer.server.port=8080
        - traefik.http.services.mcp_sct_server.loadbalancer.passHostHeader=true
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 60s

networks:
  network_public:
    name: network_public
    external: true
