id: go-insecure-tls
version: "1.0"
languages: [go]
severity: HIGH
category: cryptography
cwe: CWE-295
owasp: "A02:2021"
confidence: 0.85
message: >
  Insecure TLS configuration detected. Disabling certificate verification
  or using weak TLS versions exposes the application to MITM attacks.

patterns:
  - pattern: 'InsecureSkipVerify\s*:\s*true'
    type: regex
  - pattern: 'MinVersion\s*:\s*tls\.VersionSSL30|MinVersion\s*:\s*tls\.VersionTLS10'
    type: regex
  - pattern: 'tls\.Config\{[^}]*InsecureSkipVerify'
    type: regex

exclude_patterns:
  - pattern: '^\s*//'
    type: regex
  - pattern: '_test\.go'
    type: regex

fix_template: |
  Use secure TLS configuration:

  BAD:
  &tls.Config{InsecureSkipVerify: true}

  GOOD:
  &tls.Config{
      MinVersion: tls.VersionTLS12,
      CipherSuites: []uint16{
          tls.TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,
          tls.TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,
      },
  }

references:
  - "https://cheatsheetseries.owasp.org/cheatsheets/TLS_Cipher_String_Cheat_Sheet.html"

metadata:
  author: MCP-SCT
  tags: [tls, ssl, certificate, crypto, owasp-top10]
