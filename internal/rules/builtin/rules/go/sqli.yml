id: go-sqli-string-format
version: "1.0"
languages: [go]
severity: CRITICAL
category: injection
cwe: CWE-89
owasp: "A03:2021"
confidence: 0.85
message: >
  SQL query constructed using fmt.Sprintf or string concatenation.
  Use parameterized queries with placeholder arguments.

patterns:
  - pattern: 'fmt\.Sprintf\(.*SELECT.*FROM|fmt\.Sprintf\(.*INSERT.*INTO|fmt\.Sprintf\(.*UPDATE.*SET|fmt\.Sprintf\(.*DELETE.*FROM'
    type: regex
  - pattern: '\.Query\(.*\+|\.Exec\(.*\+'
    type: regex
  - pattern: '\.QueryRow\(.*fmt\.Sprintf'
    type: regex

exclude_patterns:
  - pattern: '^\s*//'
    type: regex
  - pattern: '\.Query\(.*,\s*\w'
    type: regex

fix_template: |
  Use parameterized queries:

  BAD:  db.Query(fmt.Sprintf("SELECT * FROM users WHERE id = %d", id))
  GOOD: db.Query("SELECT * FROM users WHERE id = $1", id)

  BAD:  db.Exec("INSERT INTO users (name) VALUES ('" + name + "')")
  GOOD: db.Exec("INSERT INTO users (name) VALUES ($1)", name)

references:
  - "https://go.dev/doc/database/sql-injection"

metadata:
  author: MCP-SCT
  tags: [sql, injection, database, owasp-top10]
