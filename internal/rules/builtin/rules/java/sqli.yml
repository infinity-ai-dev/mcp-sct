id: java-sqli-string-concat
version: "1.0"
languages: [java]
severity: CRITICAL
category: injection
cwe: CWE-89
owasp: "A03:2021"
confidence: 0.85
message: >
  SQL query constructed using string concatenation. Use PreparedStatement
  with parameterized queries to prevent SQL injection.

patterns:
  - pattern: 'createStatement\(\).*execute.*\+'
    type: regex
  - pattern: 'Statement.*execute\(.*\+'
    type: regex
  - pattern: '"SELECT.*".*\+.*".*FROM|"INSERT.*".*\+.*".*INTO|"UPDATE.*".*\+.*".*SET|"DELETE.*".*\+.*".*FROM'
    type: regex

exclude_patterns:
  - pattern: '^\s*//'
    type: regex
  - pattern: 'PreparedStatement|prepareStatement'
    type: regex

fix_template: |
  Use PreparedStatement:

  BAD:
  Statement stmt = conn.createStatement();
  stmt.executeQuery("SELECT * FROM users WHERE id = " + userId);

  GOOD:
  PreparedStatement stmt = conn.prepareStatement("SELECT * FROM users WHERE id = ?");
  stmt.setInt(1, userId);
  ResultSet rs = stmt.executeQuery();

references:
  - "https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html"

metadata:
  author: MCP-SCT
  tags: [sql, injection, jdbc, owasp-top10]
