id: java-hardcoded-secrets
version: "1.0"
languages: [java]
severity: HIGH
category: secrets
cwe: CWE-798
owasp: "A07:2021"
confidence: 0.70
message: >
  Potential hardcoded credential found in Java code. Use environment
  variables or a secrets manager instead of embedding secrets.

patterns:
  - pattern: '(?i)(password|passwd)\s*=\s*"[^"]{4,}"'
    type: regex
  - pattern: '(?i)(api_key|apiKey|secret_key|secretKey)\s*=\s*"[^"]{8,}"'
    type: regex
  - pattern: '(?i)(token|auth_token|authToken)\s*=\s*"[^"]{8,}"'
    type: regex
  - pattern: '(?i)DriverManager\.getConnection\(.*".*",\s*".*",\s*"[^"]{4,}"'
    type: regex

exclude_patterns:
  - pattern: '^\s*//'
    type: regex
  - pattern: '(?i)(example|placeholder|changeme|test|dummy|fake|mock|TODO)'
    type: regex
  - pattern: 'System\.getenv|System\.getProperty|config\.'
    type: regex

fix_template: |
  Use environment variables or a secrets manager:

  BAD:
  String password = "super_secret";

  GOOD:
  String password = System.getenv("DB_PASSWORD");

references:
  - "https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html"

metadata:
  author: MCP-SCT
  tags: [secrets, credentials, hardcoded, owasp-top10]
