id: js-hardcoded-secrets
version: "1.0"
languages: [javascript, typescript]
severity: HIGH
category: secrets
cwe: CWE-798
owasp: "A07:2021"
confidence: 0.70
message: >
  Potential hardcoded credential or secret. Use environment variables
  or a secrets manager instead of embedding secrets in source code.

patterns:
  - pattern: '(?i)(password|passwd|pwd)\s*[:=]\s*["\x27`][^"\x27`]{4,}["\x27`]'
    type: regex
  - pattern: '(?i)(api_key|apikey|api_secret|apiSecret)\s*[:=]\s*["\x27`][^"\x27`]{8,}["\x27`]'
    type: regex
  - pattern: '(?i)(secret_key|secretKey|secret)\s*[:=]\s*["\x27`][^"\x27`]{8,}["\x27`]'
    type: regex
  - pattern: '(?i)(token|auth_token|authToken|access_token|accessToken)\s*[:=]\s*["\x27`][^"\x27`]{8,}["\x27`]'
    type: regex
  - pattern: '(?i)(AKIA[0-9A-Z]{16})'
    type: regex

exclude_patterns:
  - pattern: '^\s*//'
    type: regex
  - pattern: '(?i)(example|placeholder|changeme|your_|xxx|test|dummy|fake|mock|TODO)'
    type: regex
  - pattern: 'process\.env|env\.'
    type: regex
  - pattern: '\.env'
    type: regex

fix_template: |
  Use environment variables:

  BAD:  const API_KEY = "sk-1234567890abcdef"
  GOOD: const API_KEY = process.env.API_KEY

  With dotenv:
  require("dotenv").config()
  const API_KEY = process.env.API_KEY

references:
  - "https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html"

metadata:
  author: MCP-SCT
  tags: [secrets, credentials, hardcoded, owasp-top10]
