id: python-hardcoded-secrets
version: "1.0"
languages: [python]
severity: HIGH
category: secrets
cwe: CWE-798
owasp: "A07:2021"
confidence: 0.70
message: >
  Potential hardcoded credential or secret found. Secrets should be stored
  in environment variables or a secrets manager, never in source code.

patterns:
  - pattern: '(?i)(password|passwd|pwd)\s*=\s*["\x27][^"\x27]{4,}["\x27]'
    type: regex
  - pattern: '(?i)(api_key|apikey|api_secret)\s*=\s*["\x27][^"\x27]{8,}["\x27]'
    type: regex
  - pattern: '(?i)(secret_key|secret)\s*=\s*["\x27][^"\x27]{8,}["\x27]'
    type: regex
  - pattern: '(?i)(token|auth_token|access_token)\s*=\s*["\x27][^"\x27]{8,}["\x27]'
    type: regex
  - pattern: '(?i)(aws_access_key_id|aws_secret_access_key)\s*=\s*["\x27][A-Za-z0-9/+=]{16,}["\x27]'
    type: regex

exclude_patterns:
  - pattern: '^\s*#'
    type: regex
  - pattern: '(?i)(example|placeholder|changeme|your_|xxx|test|dummy|fake|mock)'
    type: regex
  - pattern: 'os\.environ|os\.getenv|config\.'
    type: regex

fix_template: |
  Use environment variables or a secrets manager:

  BAD:  API_KEY = "sk-1234567890abcdef"
  GOOD: API_KEY = os.environ["API_KEY"]

  Or use python-dotenv:
  from dotenv import load_dotenv
  load_dotenv()
  API_KEY = os.getenv("API_KEY")

references:
  - "https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html"

metadata:
  author: MCP-SCT
  tags: [secrets, credentials, hardcoded, owasp-top10]
